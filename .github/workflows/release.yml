name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build — Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev
      - name: Build
        run: make
      - name: Rename binary
        run: mv pong pong-linux-x86_64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pong-linux-x86_64
          path: pong-linux-x86_64

  build-macos:
    name: Build — macOS ARM (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Rename binary
        run: mv pong pong-macos-arm64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pong-macos-arm64
          path: pong-macos-arm64

  build-windows:
    name: Build — Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pdcurses
      - name: Build
        run: mingw32-make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pong-windows-x86_64
          path: pong.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pong-linux-x86_64
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pong-macos-arm64
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pong-windows-x86_64
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pong-linux-x86_64
            pong-macos-arm64
            pong.exe
          generate_release_notes: true
